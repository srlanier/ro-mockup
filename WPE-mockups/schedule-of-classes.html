<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule of Classes</title>
    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Merriweather:wght@700&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Papa Parse for CSV parsing -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Oswald', sans-serif;
        }

        p {
            font-family: 'Merriweather', serif;
        }

        /* Custom styles for icons */
        .search-icon {
            width: 1.5rem;
            height: 1.5rem;
        }

        .filter-icon {
            width: 1.75rem;
            height: 1.75rem;
        }

        /* Custom class for smooth dropdown transition */
        .dropdown-panel {
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
            transform-origin: top;
        }

        .dropdown-panel.hidden {
            opacity: 0;
            transform: translateY(-10px) scaleY(0.95);
            pointer-events: none;
        }

        /* Custom checkbox styling - UGA red when checked */
        input[type="checkbox"] {
            accent-color: #ba0c2f;
        }

        /* Course card layout */
        .course-cards {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .course-card {
            background: #ffffff;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 -1px 2px rgba(0,0,0,0.04), 3px 4px 8px rgba(0,0,0,0.12);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.9rem 1.25rem 0.1rem;
        }

        .card-header-left {
            display: flex;
            align-items: baseline;
            gap: 0.6rem;
            min-width: 0;
        }

        .card-course-num {
            font-family: 'Oswald', sans-serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: #ba0c2f;
            letter-spacing: 0.02em;
            flex-shrink: 0;
        }

        .card-title {
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: #444;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .section-count {
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 500;
            color: #999;
            background: #f3f3f3;
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            letter-spacing: 0.02em;
            flex-shrink: 0;
            white-space: nowrap;
            margin-left: 0.5rem;
        }

        /* Section rows */
        .section-rows {
            padding: 0 1.25rem 0.5rem;
        }

        .section-row {
            display: grid;
            grid-template-columns: 60px 1.3fr 1.1fr 1.1fr 0.7fr 0.7fr 130px;
            gap: 0 0.75rem;
            align-items: center;
            padding: 0.55rem 0;
            border-top: 1px solid #f2f2f2;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: #555;
        }

        .section-row.section-full {
            opacity: 0.5;
        }

        .section-crn {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            color: #aaa;
            letter-spacing: 0.01em;
        }

        /* Column headers for section rows */
        .section-header {
            display: grid;
            grid-template-columns: 60px 1.3fr 1.1fr 1.1fr 0.7fr 0.7fr 130px;
            gap: 0 0.75rem;
            padding: 0.4rem 0 0.25rem;
            font-family: 'Oswald', sans-serif;
            font-size: 0.6rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #aaa;
        }

        .section-header span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .header-icon {
            width: 11px;
            height: 11px;
            flex-shrink: 0;
            color: #bbb;
        }

        .section-cell {
            line-height: 1.4;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .section-seats {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            color: #555;
        }

        .seats-text {
            white-space: nowrap;
        }

        .seats-text.seats-low {
            color: #d97706;
            font-weight: 600;
        }

        .seats-text.seats-none {
            color: #c0392b;
            font-weight: 600;
        }

        .full-badge {
            font-family: 'Oswald', sans-serif;
            font-size: 0.55rem;
            font-weight: 600;
            color: #fff;
            background: #c0392b;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        @media (max-width: 1000px) {
            .section-header {
                display: none;
            }
            .section-row {
                grid-template-columns: 55px 1fr 1fr;
                gap: 0.25rem 0.6rem;
            }
            .section-crn {
                grid-row: span 2;
                align-self: center;
            }
        }

        @media (max-width: 600px) {
            .card-header-left {
                flex-wrap: wrap;
            }
            .section-row {
                grid-template-columns: 1fr 1fr;
                gap: 0.2rem 0.6rem;
            }
            .section-crn {
                grid-column: 1 / -1;
                grid-row: auto;
                justify-self: start;
            }
            .section-seats {
                grid-column: 1 / -1;
            }
        }

        /* Pagination styles */
        .pagination-wrapper {
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .pagination-info {
            font-size: 1.55rem;
            color: #555;
            margin-bottom: 0.5rem;
            font-family: Oswald, sans-serif;
            text-transform: uppercase;
        }

        .pagination-buttons button {
            margin: 0 4px;
            padding: 6px 10px;
            border: 1px solid #ccc;
            background: white;
            color: #333;
            cursor: pointer;
            border-radius: 4px;
        }

        .pagination-buttons button.active-page {
            background-color: #BA0C2F;
            color: white;
            font-weight: bold;
        }

        .no-results {
            text-align: center;
            color: #666;
            font-size: 1.2rem !important;
            padding: 3rem !important;
        }

        /* Spinner for loading */
        .spinner {
            margin: 10px auto 0;
            width: 150px;
            text-align: center;
        }

        .spinner > div {
            width: 25px;
            height: 25px;
            background-color: #ba0c2f;
            border-radius: 100%;
            display: inline-block;
            -webkit-animation: sk-bouncedelay 1.4s infinite ease-in-out both;
            animation: sk-bouncedelay 1.4s infinite ease-in-out both;
        }

        .spinner .bounce1 {
            -webkit-animation-delay: -0.32s;
            animation-delay: -0.32s;
        }

        .spinner .bounce2 {
            -webkit-animation-delay: -0.16s;
            animation-delay: -0.16s;
        }

        @-webkit-keyframes sk-bouncedelay {
            0%, 80%, 100% { -webkit-transform: scale(0) }
            40% { -webkit-transform: scale(1.0) }
        }

        @keyframes sk-bouncedelay {
            0%, 80%, 100% {
                -webkit-transform: scale(0);
                transform: scale(0);
            }
            40% {
                -webkit-transform: scale(1.0);
                transform: scale(1.0);
            }
        }

        /* Term Selector Pills */
        .term-pill {
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.15);
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
        }

        .term-pill:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
        }

        .term-pill.active {
            background: white;
            color: #ba0c2f;
            border-color: white;
            font-weight: 500;
        }

        .archive-pill {
            border-style: dashed;
            text-decoration: none;
        }

        .archive-pill:hover {
            border-style: solid;
        }

        /* Filter Panel Styles */
        .filter-columns {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0 2rem;
        }

        .filter-column {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .filter-col-header {
            font-family: 'Oswald', sans-serif;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #888;
            padding-bottom: 0.35rem;
            margin-bottom: 0.2rem;
            border-bottom: 1px solid #eee;
        }

        .filter-cb {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: #555;
            cursor: pointer;
            padding: 0.2rem 0;
        }

        .filter-cb:hover {
            color: #333;
        }

        .filter-cb input[type="checkbox"] {
            accent-color: #ba0c2f;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        @media (max-width: 640px) {
            .filter-columns {
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
            }
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-bg': '#fef4ea',
                        'accent-red': '#ba0c2f',
                        'dark-text': '#4a4a4a',
                    }
                }
            }
        }
    </script>
</head>

<!-- JavaScript from socTest3 for table functionality -->
<script>
    // Group data by CRN function from socTest3
    function groupByCRN(data) {
        const grouped = {};
        const dayPriority = ['MWF', 'TR', 'M', 'T', 'W', 'R', 'F', 'S', 'U'];

        function getDayRank(days) {
            const clean = (days || '').replace(/\s+/g, '').toUpperCase();
            for (let i = 0; i < dayPriority.length; i++) {
                if (clean === dayPriority[i]) return i;
            }
            for (let i = 0; i < dayPriority.length; i++) {
                if (clean.includes(dayPriority[i])) return i + 0.5;
            }
            return 99;
        }

        data.forEach(row => {
            const crn = row['CRN'];
            if (!grouped[crn]) {
                grouped[crn] = {
                    ...row,
                    sessions: []
                };
            }

            grouped[crn].sessions.push({
                days: row['DAYS'] || '',
                time: row['TIME'] || '',
                building: row['BUILDING'] || '',
                room: row['ROOM'] || ''
            });
        });

        return Object.values(grouped).map(r => {
            const sortedSessions = r.sessions
                .filter(s => s.days || s.time || s.building || s.room)
                .sort((a, b) => getDayRank(a.days) - getDayRank(b.days));

            const DAYS = [];
            const TIME = [];
            const BUILDING = [];
            const ROOM = [];

            sortedSessions.forEach(s => {
                DAYS.push(s.days || '');
                TIME.push(s.time || '');
                BUILDING.push(s.building || '');
                ROOM.push(s.room || '');
            });

            const allSame = (arr) => arr.every(val => val === arr[0]);

            return {
                ...r,
                DAYS: DAYS.join('<br>'),
                TIME: TIME.join('<br>'),
                BUILDING: allSame(BUILDING) ? BUILDING[0] : BUILDING.join('<br>'),
                ROOM: allSame(ROOM) ? ROOM[0] : ROOM.join('<br>')
            };
        });
    }

    // Filter dropdown toggle
    function toggleFilterDropdown() {
        const dropdown = document.getElementById('filter-dropdown');
        dropdown.classList.toggle('hidden');
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function(event) {
        const container = document.getElementById('search-container');
        const dropdown = document.getElementById('filter-dropdown');
        const toggleButton = document.getElementById('filter-toggle');

        if (!container.contains(event.target) && !dropdown.classList.contains('hidden')) {
            if (event.target !== toggleButton && !toggleButton.contains(event.target)) {
                dropdown.classList.add('hidden');
            }
        }
    });

    // Term selector pill functionality
    let currentTerm = 'spring2026';

    document.getElementById('term-selector').addEventListener('click', function(event) {
        const pill = event.target.closest('button.term-pill');
        if (!pill) return;

        const term = pill.dataset.term;

        // Update active state
        document.querySelectorAll('.term-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');

        // Update current term and reload data
        currentTerm = term;
        console.log('Switched to term:', term);

        // TODO: Wire up to load different term data
    });

    // Main table functionality
    document.addEventListener('DOMContentLoaded', () => {
        let courseData = [], filteredData = [];
        const rowsPerPage = 50;
        let currentPage = 1;

        const courseCardContainer = document.getElementById('courseCardContainer');
        const paginationContainer = document.getElementById('pagination');
        const paginationInfo = document.getElementById('pagination-info');
        const searchInput = document.getElementById('searchInput');

        // Get checked checkbox values by class name
        function getCheckedValues(className) {
            return Array.from(document.querySelectorAll('.' + className + ':checked')).map(cb => cb.value);
        }

        // Filter matchers
        function matchesCampus(row, selected) {
            if (selected.length === 0) return true;
            return selected.some(cat => row.Category && row.Category.includes(cat));
        }

        function matchesDays(row, selected) {
            if (selected.length === 0) return true;
            const days = (row['DAYS'] || '').toUpperCase().replace(/<br>/g, '');
            return selected.some(d => days.includes(d));
        }

        function matchesPot(row, selected) {
            if (selected.length === 0) return true;
            const pot = (row['PART OF TERM'] || '').trim();
            return selected.includes(pot);
        }

        // Define applyFilters
        function applyFilters() {
            const query = searchInput.value.trim().toLowerCase();
            const normalizedQ = query.replace(/\s+/g, '');
            const hideFull = document.getElementById('hide-full-cb').checked;
            const selectedCampuses = getCheckedValues('campus-cb');
            const selectedDays = getCheckedValues('day-cb');
            const selectedPots = getCheckedValues('pot-cb');

            function passesFilters(r) {
                const seats = parseInt(r['SEATS AVAILABLE']);
                if (hideFull && (!isNaN(seats) && seats === 0)) return false;
                if (!matchesCampus(r, selectedCampuses)) return false;
                if (!matchesDays(r, selectedDays)) return false;
                if (!matchesPot(r, selectedPots)) return false;
                return true;
            }

            const prefixMatches = courseData.filter(r => {
                const courseNum = (r['COURSE NUMBER'] || '').toLowerCase().replace(/\s+/g, '');
                if (!passesFilters(r)) return false;
                return courseNum.startsWith(normalizedQ);
            });

            const otherMatches = courseData.filter(r => {
                const courseNum = (r['COURSE NUMBER'] || '').toLowerCase().replace(/\s+/g, '');
                if (!passesFilters(r)) return false;
                if (courseNum.startsWith(normalizedQ)) return false;

                const searchableKeys = [
                    'COURSE NUMBER', 'COURSE NAME', 'CRN', 'INSTRUCTOR',
                    'CAMPUS', 'PART OF TERM', 'DAYS', 'TIME', 'BUILDING', 'CROSS LIST'
                ];
                const rawQuery = searchInput.value.trim().toLowerCase();
                const queryWords = rawQuery.split(/\s+/);
                const allF = searchableKeys
                    .map(k => (r[k] || '').toString().toLowerCase().replace(/\s+/g, ''))
                    .join('');
                return queryWords.every(qw => allF.includes(qw));
            });

            filteredData = prefixMatches.concat(otherMatches);

            filteredData.sort((a, b) => {
                const aEmpty = !a['COURSE NUMBER'];
                const bEmpty = !b['COURSE NUMBER'];
                if (aEmpty && !bEmpty) return 1;
                if (!aEmpty && bEmpty) return -1;
                return 0;
            });

            currentPage = 1;
            renderTable();
            renderPagination();
        }

        // Add change handlers to filter checkboxes
        document.querySelectorAll('.day-cb, .campus-cb, #hide-full-cb').forEach(cb => {
            cb.addEventListener('change', applyFilters);
        });

        // Populate Part of Term checkboxes dynamically after data loads
        function populatePotFilter(data) {
            const pots = [...new Set(data.map(r => (r['PART OF TERM'] || '').trim()).filter(Boolean))].sort();
            const container = document.getElementById('pot-checkboxes');
            container.innerHTML = '';
            pots.forEach(pot => {
                const label = document.createElement('label');
                label.className = 'filter-cb';
                label.innerHTML = '<input type="checkbox" class="pot-cb" value="' + pot + '"> ' + pot;
                label.querySelector('input').addEventListener('change', applyFilters);
                container.appendChild(label);
            });
        }

        // Fetch and parse CSV data
        fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTef4md7UDxIUWVcycO5Idee3si3uSqlF1KBG52-aC64aKfyNuMARbz3YvL1WMnNzYGgvHKwwScWUt0/pub?gid=509407845&single=true&output=csv')
            .then(r => {
                console.log('Fetch response:', r);
                return r.text();
            })
            .then(csv => {
                console.log('CSV loaded, length:', csv.length);
                const parsed = Papa.parse(csv, { header: true }).data
                    .filter(r => r['CRN'] !== 'StringFilter')
                    .map(r => {
                        const campusRaw = (r['CAMPUS'] || '').toLowerCase();
                        r.Category = [];

                        if (campusRaw.includes('online')) r.Category.push('online');
                        if (campusRaw.includes('tifton')) r.Category.push('tifton');
                        if (campusRaw.includes('griffin')) r.Category.push('griffin');
                        if (campusRaw.includes('athens')) r.Category.push('athens');
                        if (r.Category.length === 0) r.Category.push('other');

                        const courseNumRaw = (r['COURSE NUMBER'] || '').replace(/\s+/g, '');
                        const courseTitle = (r['COURSE NAME'] || '').toLowerCase();
                        if (
                            /^[A-Za-z]{2,4}\d{4}H$/i.test(courseNumRaw) ||
                            courseTitle.endsWith('honors') ||
                            courseTitle.includes('honors')
                        ) {
                            if (!r.Category.includes('honors')) r.Category.push('honors');
                        }

                        r['COURSE NUMBER'] = courseNumRaw.toUpperCase();
                        return r;
                    })
                    .sort((a, b) => ((a['COURSE NUMBER'] || '').toUpperCase())
                        .localeCompare((b['COURSE NUMBER'] || '').toUpperCase(), undefined, { numeric: true }));

                courseData = groupByCRN(parsed).sort((a, b) => {
                    const aCN = (a['COURSE NUMBER'] || '').toUpperCase();
                    const bCN = (b['COURSE NUMBER'] || '').toUpperCase();
                    return aCN.localeCompare(bCN, undefined, { numeric: true });
                });

                console.log('Course data loaded:', courseData.length, 'courses');
                populatePotFilter(courseData);
                applyFilters();
            })
            .catch(error => {
                console.error('Error loading data:', error);
                paginationInfo.innerHTML = 'Error loading class data. Please refresh the page.';
            });

        searchInput.addEventListener('input', applyFilters);
        searchInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                applyFilters();
            }
        });

        // SVG icon templates (used in column headers)
        const icons = {
            person: '<svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
            calendar: '<svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
            building: '<svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>',
            mapPin: '<svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
            tag: '<svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>',
            users: '<svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>'
        };

        // Group filtered sections into course cards
        function groupByCourseNumber(data) {
            const groups = {};
            const order = [];
            data.forEach(r => {
                const key = r['COURSE NUMBER'] || 'UNKNOWN';
                if (!groups[key]) {
                    groups[key] = {
                        courseNumber: key,
                        courseName: r['COURSE NAME'] || '',
                        sections: []
                    };
                    order.push(key);
                }
                groups[key].sections.push(r);
            });
            return order.map(k => groups[k]);
        }

        let courseGroups = [];

        function renderTable() {
            courseCardContainer.innerHTML = '';
            courseGroups = groupByCourseNumber(filteredData);

            if (courseGroups.length === 0) {
                courseCardContainer.innerHTML = '<div class="no-results">No matching results found.</div>';
                paginationContainer.style.display = 'none';
                return;
            }

            paginationContainer.style.display = '';
            const start = (currentPage - 1) * rowsPerPage;
            const pageGroups = courseGroups.slice(start, start + rowsPerPage);

            pageGroups.forEach(group => {
                // Format course number with space (e.g. "ENGL1101" → "ENGL 1101")
                let courseNum = group.courseNumber;
                if (courseNum.length > 4) {
                    courseNum = courseNum.slice(0, 4) + ' ' + courseNum.slice(4);
                }

                const sectionCount = group.sections.length;
                const card = document.createElement('div');
                card.className = 'course-card';

                // Card header with course number + title + section count badge
                let html = `
                    <div class="card-header">
                        <div class="card-header-left">
                            <span class="card-course-num">${courseNum}</span>
                            <span class="card-title">${group.courseName}</span>
                            <span class="section-count">${sectionCount} section${sectionCount !== 1 ? 's' : ''}</span>
                        </div>
                    </div>
                    <div class="section-rows">
                        <div class="section-header">
                            <span>CRN</span>
                            <span>${icons.person} Instructor</span>
                            <span>${icons.calendar} Schedule</span>
                            <span>${icons.building} Location</span>
                            <span>${icons.mapPin} Campus</span>
                            <span>${icons.tag} Part of Term</span>
                            <span>${icons.users} Seats</span>
                        </div>
                `;

                // Render each section as a row
                group.sections.forEach(r => {
                    const availSeats = parseInt(r['SEATS AVAILABLE']);
                    const maxSeats = parseInt(r['MAX STUDENTS']);
                    const isFull = !isNaN(availSeats) && availSeats === 0;
                    const hasSeatsData = !isNaN(maxSeats) && !isNaN(availSeats);

                    // Combine days + time per session
                    const daysArr = (r['DAYS'] || '').split('<br>');
                    const timeArr = (r['TIME'] || '').split('<br>');
                    const schedule = daysArr.map((d, i) => {
                        const t = timeArr[i] || '';
                        return [d, t].filter(Boolean).join(' ');
                    }).filter(s => s.trim()).join('<br>') || 'TBA';

                    // Combine building + room per session
                    const bldgArr = (r['BUILDING'] || '').split('<br>');
                    const roomArr = (r['ROOM'] || '').split('<br>');
                    const location = bldgArr.map((b, i) => {
                        const rm = roomArr[i] || '';
                        return [b, rm].filter(Boolean).join(' ');
                    }).filter(s => s.trim()).join('<br>') || 'TBA';

                    // Seats display
                    let seatsHtml = '';
                    if (isFull) {
                        seatsHtml = '<span class="full-badge">Full</span>';
                    } else if (hasSeatsData) {
                        const pct = maxSeats > 0 ? (availSeats / maxSeats) * 100 : 100;
                        const cls = pct <= 0 ? ' seats-none' : pct < 25 ? ' seats-low' : '';
                        seatsHtml = `<span class="seats-text${cls}">${availSeats} / ${maxSeats}</span>`;
                    } else {
                        seatsHtml = '<span class="seats-text">—</span>';
                    }

                    html += `
                        <div class="section-row${isFull ? ' section-full' : ''}">
                            <span class="section-crn">${r['CRN'] || ''}</span>
                            <span class="section-cell">${r['INSTRUCTOR'] || 'TBA'}</span>
                            <span class="section-cell">${schedule}</span>
                            <span class="section-cell">${location}</span>
                            <span class="section-cell">${r['CAMPUS'] || ''}</span>
                            <span class="section-cell">${r['PART OF TERM'] || ''}</span>
                            <div class="section-seats">${seatsHtml}</div>
                        </div>
                    `;
                });

                html += '</div>';
                card.innerHTML = html;
                courseCardContainer.appendChild(card);
            });
        }

        function renderPagination() {
            const total = Math.ceil(courseGroups.length / rowsPerPage);
            const sectionTotal = filteredData.length;
            paginationInfo.textContent = `${courseGroups.length} courses · ${sectionTotal} sections · Page ${currentPage} of ${total}`;
            paginationContainer.innerHTML = '';

            const btn = (p) => {
                const b = document.createElement('button');
                b.textContent = p;
                if (p === currentPage) b.classList.add('active-page');
                b.addEventListener('click', () => {
                    currentPage = p;
                    renderTable();
                    renderPagination();
                    window.scrollTo({ top: document.querySelector('.course-cards').offsetTop - 100, behavior: 'smooth' });
                });
                paginationContainer.appendChild(b);
            };

            const ell = () => {
                const s = document.createElement('span');
                s.textContent = '…';
                s.style.margin = '0 6px';
                paginationContainer.appendChild(s);
            };

            if (total > 0) btn(1);
            if (currentPage > 3) ell();
            for (let i = Math.max(2, currentPage - 1); i <= Math.min(total - 1, currentPage + 1); i++) btn(i);
            if (currentPage < total - 2) ell();
            if (total > 1) btn(total);
        }
    });
</script>

<!-- Load Navbar from Partial -->
<script>
    fetch('../partials/navbar.html')
        .then(response => response.text())
        .then(html => {
            document.getElementById('navbar-placeholder').innerHTML = html;
            initializeNavbar();
        })
        .catch(error => {
            console.error('Error loading navbar:', error);
        });

    function initializeNavbar() {
        const logo = document.getElementById('uga-logo');
        if (logo) logo.src = '../images/OfficeRegistrar_logo_Horizontal_FC.png';

        const dropdownMenus = document.querySelectorAll(".dropdown-menu");
        dropdownMenus.forEach(menu => {
            const links = Array.from(menu.querySelectorAll("a"));
            links.sort((a, b) => a.textContent.localeCompare(b.textContent));
            menu.innerHTML = "";
            links.forEach(link => menu.appendChild(link));
        });

        const btn = document.getElementById('navToggle');
        const scrim = document.getElementById('mobileScrim');
        const drawer = document.getElementById('mobileDrawer');
        const close = document.getElementById('drawerClose');
        const dstUL = document.getElementById('drawerLinks');

        function openMenu(){ body.classList.add('menu-open'); btn?.setAttribute('aria-expanded','true'); drawer?.setAttribute('aria-hidden','false'); }
        function closeMenu(){ body.classList.remove('menu-open'); btn?.setAttribute('aria-expanded','false'); drawer?.setAttribute('aria-hidden','true'); }

        btn?.addEventListener('click', () => body.classList.contains('menu-open') ? closeMenu() : openMenu());
        close?.addEventListener('click', closeMenu);
        scrim?.addEventListener('click', closeMenu);
        window.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });
        window.matchMedia('(min-width: 981px)').addEventListener('change', e => { if (e.matches) closeMenu(); });

        const srcUL = document.querySelector('#navbar .nav-links');
        if (!srcUL || !dstUL) return;

        dstUL.innerHTML = '';

        [...srcUL.children].forEach(li => {
            const item = document.createElement('li');
            const topLink = li.querySelector(':scope > a');
            const dropdown = li.querySelector(':scope .dropdown-menu');

            if (dropdown) {
                const title = (topLink?.textContent || '').trim() || 'Menu';
                const btnHdr = document.createElement('button');
                btnHdr.className = 'acc-btn';
                btnHdr.type = 'button';
                btnHdr.setAttribute('aria-expanded', 'false');
                btnHdr.textContent = title;

                const panel = document.createElement('div');
                panel.className = 'acc-panel';

                const links = dropdown.querySelectorAll('a');
                links.forEach(a => {
                    const cloneA = a.cloneNode(true);
                    cloneA.removeAttribute('style');
                    cloneA.className = '';
                    panel.appendChild(cloneA);
                });

                item.appendChild(btnHdr);
                item.appendChild(panel);
            } else if (topLink) {
                const a = topLink.cloneNode(true);
                a.removeAttribute('style');
                a.className = 'toplink';
                item.appendChild(a);
            }

            dstUL.appendChild(item);
        });

        dstUL.addEventListener('click', (e) => {
            const btnHdr = e.target.closest('.acc-btn');
            if (!btnHdr) return;

            const panel = btnHdr.nextElementSibling;
            const isOpen = btnHdr.getAttribute('aria-expanded') === 'true';

            dstUL.querySelectorAll('.acc-btn[aria-expanded="true"]').forEach(b => {
                if (b !== btnHdr) {
                    b.setAttribute('aria-expanded','false');
                    const p = b.nextElementSibling;
                    p?.classList.remove('open');
                    p?.style.removeProperty('max-height');
                }
            });

            btnHdr.setAttribute('aria-expanded', String(!isOpen));
            if (!isOpen) {
                panel.classList.add('open');
                panel.style.maxHeight = panel.scrollHeight + 'px';
            } else {
                panel.classList.remove('open');
                panel.style.maxHeight = '0px';
            }
        });

        window.addEventListener('resize', () => {
            dstUL.querySelectorAll('.acc-btn[aria-expanded="true"]').forEach(b => {
                const p = b.nextElementSibling;
                if (p) p.style.maxHeight = p.scrollHeight + 'px';
            });
        });
    }
</script>
